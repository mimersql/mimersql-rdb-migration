# jdbc.properties
# Configuration for JdbcCopyTable utility
#
# Copy tables from Oracle Rdb to Mimer SQL

# Source database (Oracle Rdb)
source.driver=oracle.rdb.jdbc.rdbNative.Driver
source.url=jdbc:rdbNative:DKA100:[RDBEXA.MF_PERSONNEL]MF_PERSONNEL
source.username=
source.password=

# Target database (Mimer SQL)
# Username and password are given as parameters
# TCP/IP
# target.url=jdbc:mimer://localhost:1360/personnel
# Local communication
target.url=jdbc:mimer:local:personnel
target.username=<your Mimer SQL user>
target.password=<your Mimer SQL user password>
target.mimerload=true

# Batch size for inserts (default: 1000)
batch.size=1000

# Fetch size - rows fetched from source per round-trip (default: 1000)
fetch.size=1000

# Load threads. 
# To use parallell loader threads in a safe way, foreign kesy should be removed before loading and added after loading.
# This can be done by creating [.EXTRA_SQL]<SCHEMA>-BEFORE-LOAD.SQL and [.EXTRA_SQL]<SCHEMA>-AFTER-LOAD.SQL
threads=1
#Show debug output
debug=false
#Show verbose output about tables and rows processed
verbose=true
#Show timing information
timing=false
# Notes:
# - Empty source.username and source.password uses OS authentication
# - On OpenVMS, make sure JAVA$CLASSPATH includes both JDBC drivers
# - Properties file can be in current directory or specify full path
